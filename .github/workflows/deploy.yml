name: Deploy to AWS Lightsail

on:
  push:
    branches: [main]
  workflow_dispatch:
  # Scarab fires this when SEO content is published/updated, triggering a
  # rebuild so the static content pages (and any new route groups) go live.
  repository_dispatch:
    types: [content-published]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
          # Scarab SEO content layer — build-time only. Leave the secrets unset
          # to build the site without the content pages.
          CONTENT_API_BASE_URL: ${{ secrets.CONTENT_API_BASE_URL }}
          CONTENT_API_READ_TOKEN: ${{ secrets.CONTENT_API_READ_TOKEN }}
          CONTENT_API_PRODUCT_KEY: ${{ vars.CONTENT_API_PRODUCT_KEY }}
          NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL }}
        run: |
          docker build \
            --build-arg CONTENT_API_BASE_URL="$CONTENT_API_BASE_URL" \
            --build-arg CONTENT_API_READ_TOKEN="$CONTENT_API_READ_TOKEN" \
            --build-arg CONTENT_API_PRODUCT_KEY="$CONTENT_API_PRODUCT_KEY" \
            --build-arg NEXT_PUBLIC_SITE_URL="$NEXT_PUBLIC_SITE_URL" \
            -t $REGISTRY/$REPOSITORY:$IMAGE_TAG \
            -t $REGISTRY/$REPOSITORY:latest .
          docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG
          docker push $REGISTRY/$REPOSITORY:latest
          echo "IMAGE=$REGISTRY/$REPOSITORY:$IMAGE_TAG" >> $GITHUB_ENV

      - name: Generate Lightsail deployment config
        env:
          IMAGE: ${{ env.IMAGE }}
        run: |
          python3 -c "
          import json, os
          e = {k: v.strip() for k, v in os.environ.items()}
          cfg = {
            'web': {
              'image': e['IMAGE'],
              'environment': {'NODE_ENV': 'production'},
              'ports': {'3000': 'HTTP'},
            }
          }
          open('containers.json', 'w').write(json.dumps(cfg))
          "

          cat > endpoint.json << 'EOF'
          {
            "containerName": "web",
            "containerPort": 3000,
            "healthCheck": {
              "path": "/api/health",
              "intervalSeconds": 15,
              "timeoutSeconds": 5,
              "successCodes": "200"
            }
          }
          EOF

      - name: Deploy to Lightsail
        run: |
          aws lightsail create-container-service-deployment \
            --service-name "${{ secrets.LIGHTSAIL_SERVICE_NAME }}" \
            --containers file://containers.json \
            --public-endpoint file://endpoint.json

      - name: Wait for RUNNING state
        run: |
          for i in $(seq 1 24); do
            STATE=$(aws lightsail get-container-services \
              --service-name "${{ secrets.LIGHTSAIL_SERVICE_NAME }}" \
              --query 'containerServices[0].state' --output text)
            echo "State: $STATE"
            [ "$STATE" = "RUNNING" ] && exit 0
            sleep 15
          done
          echo "Did not reach RUNNING after 6 min" >&2; exit 1
